<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <!--  form 태그 : 유저가 입력한 정보를 제출하기 위해, 범위를 지정하는 태그. -->
  <form action="" method="get">

    <fieldset>

      <!-- legend : 필드셋 태그의 콘텐츠를 설명하는 태그. -->
      <legend>로그인 폼</legend>

      <input type="text" value="미리 넣어둔 값" name="readonlyEmail" readonly>
      <br>
      <!-- input 태그 : 데이터를 입력 받을 수 있는 태그 -->
      <label for="account">ID:</label>
      <input type="text" id="account" required minlength="2" maxlength="5" placeholder="입력하세요!">
      <br>
      <label for="password">PW:</label>
      <input type="password" id="password">
      <br><br>

      <!-- textarea 태그 : 여러 줄을 입력하는 텍스트 영역을 만드는 태그 -->
       <label for="info">기타</label>
       <br>
      <textarea name="info" id="info" cols="10" rows="5"></textarea>
      <br><br>

      <!-- select 태그 :  선택 박스를 만드는 태그. -->
       <!-- option 태그 : 드롭다운의 리스트를 만드는 태그. 
          value속성은, 백엔드 서버로 넘겨줄 값을 지정함.
          selected 속성은, 초기에 선택되어 보여질 항목을 지정함.
        -->
      <select name="rice" id="rice">
        <option value="bab">밥</option>
        <option value="donggas" selected>돈까스</option>
      </select>
    </fieldset>


    <!-- button 태그 : 버튼을 만들어 주는 태그. -->
    <button type="submit">전송</button>
    <button type="reset">초기화</button>
    <button type="button">버튼</button>
    <br><br>
    <!-- 기타 input의 타입 -->
    
    <!-- 숫자만 입력할수 있는 양식 -->
    <input type="number" name="number" id="number" min="0" max="5"><br>

    <!-- email 양식 -->
    <input type="email" name="email" id="email"><br>

    <!-- 숫자 이동 바 방식 -->
    <input type="range" min="0" max="10"><br>

    <!-- 달력 양식 -->
    <input type="date" name="date" id="date"> 
    <br>

    <!-- 체크박스 형태의 인풋 박스는, label (설명) 과 함께 사용됨. -->
    <!-- 체크박스 name을 통일시켜야, 체크박스가 하나다 라는걸 백엔드가 인식함 -->
     <!-- name을 이용하여 그룹화 하기에, name 속성값을 일치시켜줘야함. -->
    <input type="checkbox" name="fruit" id="banana">
    <label for="banana">바나나</label>
    <input type="checkbox" name="fruit" id="sb">
    <label for="sb">딸기</label>
    <br>



    <!-- radio 유의사항 : name을 이용해서 그룹화 하기에, name을 일치시켜야함 -->
     <!-- checked는, 기본으로 체크 -->
    <input type="radio" name="foods" id="hamberger">
    <label for="hamberger">햄버거</label>
    <input type="radio" name="foods" id="dubbab" checked>
    <label for="dubbab">덮밥</label>


    <!-- 화면의 폼에는 보이지 않으나,
      사용자가 입력을 마치면 서버로  전송되는 속성값 -->
    <input type="hidden" name="hiddenTest" value="내가 보내줄 값">



  </form>
  
</body>
</html>
