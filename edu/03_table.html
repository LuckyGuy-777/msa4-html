<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>table tag</title>
  <!-- 전체적인 스타일을 줄떄, head태그에 스타일을 줌. -->
  <style>
    table {
      border-collapse: collapse;
    }
    th, td{
        /* 속성: 속성값 형식. */
        border: 1px solid;
        
    }
  </style>
</head>
<body>
  <!-- 표를 만드는 태그. 표 전체를 감싸는데 사용됨. 테이블 태그 사이 부분이, 하나의 표 -->

  <table>
    <!-- 캡션 태그는, 표의 제목이나 설명을 작성하는 태그 -->
    <caption>성적표</caption>


    <!-- colgroup 태그 : 열을 그룹화 해서, 해당 열에 대한 스타일, 속성 등을 한번에 적용시킬때 사용  -->
     <!--  한 열에 대해서 똑같은 색상 또는 스타일을 주고싶을떄 사용함. 잘 사용안한다고 함.(유지보수 어렵기에.) -->
    <!--  -->
    <colgroup>
      <col>
      <col>
      <col style="background-color: greenyellow;">
      <col style="background-color: yellow;">
      <col >
    </colgroup>
    
     <!-- thead 태그 : 표의 제목 열들을 묶는 그룹태그  -->
    <thead>

      <!-- th, td는, tr로 감싸져야 작동함 -->
      <tr>
        <!-- th 태그는, 표의 제목열 을 표현하는 태그 -->
        <th>반</th>
        <th>이름</th>
        <th>국어</th>
        <th>영어</th>
        <th>수학</th>
      </tr>

    </thead>


    <!-- tbody : 표의 일반적인 데이터들을 묶는 그룹태그-->
    <tbody>

      <tr>
        <!-- td 태그는, 표의 데이터 열을 표현하는 태그. -->
        <!-- rowspan은, 아래로 n개만큼의 칸을 차지하게 하는 스타일  -->
        <td rowspan="2">2반</td>
        <td>홍길동</td>
        <td>90점</td>
        <td>80점</td>
        <td>70점</td>
      </tr>

      <tr>
        <!-- <td>2반</td> -->
        <td>최윤석</td>
        <td>90점</td>
        <td>80점</td>
        <td>70점</td>
      </tr>

    </tbody>


    <!-- 표의 하단 영역을 묶는 그룹 태그 -->
    <tfoot>
        <tr>
          <!-- colspan="n" 이면, 태그가, n칸 만큼의 공간을 차지함. -->
          <th colspan="2">평균</th> 
          <!-- <td></td> -->
          <td>90</td>
          <td>75</td>
          <td>60</td>
        </tr>
    </tfoot>

  </table>
</body>
</html>


  <!-- tr은 표의 행, th,td는 열 인듯함.  -->
  <!-- tr태그는, <th> or <td> 태그를 자식태그로 가진다. -->
  <!-- th는 테이블 헤더 의 약자. 표의 제목열 , 항목의 제목을 쓸때 사용 -->
   <!-- td는 테이블 데이터 의 약자. 항목의 데이터를 쓸때 사용 -->
