<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <caption><h1>회원가입을 환영합니다</h1></caption>

  <form action="" method="get">

    <fieldset>

      <legend>사용자 정보</legend>
      <ul>
        <li>
          <label for="account">ID:</label>
          <input type="text" id="account" required minlength="2" maxlength="5" placeholder="4자~10자 사이,공백없이">
          <br>
        </li>

        <li>
          <label for="email">이메일</label>
          <input type="email" name="email" id="email"><br>
        </li>
        <li>
          <label for="password">비밀번호</label>
          <input type="password" id="password" placeholder="문자와 숫자,특수 기호 포함">
        </li>
        <li> 
          <label for="password">비밀번호 확인</label>
          <input type="password" id="password">
        </li>
        <li> 
          <label for="gyngro">가입경로</label>
          <select name="gyngro" id="gyngro">
            <option value="bab">밥</option>
            <option value="gita" selected>기타</option>
          </select>
        <br>
        </li>

        <li>
          <label for="memo">메모</label><br>
          <textarea name="memo" id="memo" cols="30" rows="10" placeholder="남길 말슴이 있다면 여기에 입력!"></textarea>
        </li>
      </ul>
    
    </fieldset>

    <fieldset>
      <legend>이벤트와 새로운 소식</legend>
        <input type="radio" name="emailsend" id="yes_email" value="y">
        <label for="yes_email">메일 수신</label>
        <input type="radio" name="emailsend" id="no_email" value="n" checked>
        <label for="no_email">메일 수신 안함</label>
    </fieldset>

    <button type="submit">가입하기</button>
    <button type="reset">취소</button>
  </form>

   
  

</body>
</html>
